name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle Wrapper
        run: |
          # Download Gradle distribution and extract wrapper jar
          GRADLE_VERSION="8.4"
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          
          if [ ! -f "$WRAPPER_JAR" ] || [ $(stat -c%s "$WRAPPER_JAR" 2>/dev/null || echo 0) -lt 50000 ]; then
            echo "Downloading Gradle $GRADLE_VERSION to extract wrapper..."
            mkdir -p gradle/wrapper
            
            # Download Gradle distribution
            curl -fSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o gradle.zip
            
            # Extract wrapper jar from distribution
            unzip -p gradle.zip "gradle-${GRADLE_VERSION}/lib/plugins/gradle-wrapper-${GRADLE_VERSION}.jar" > "$WRAPPER_JAR"
            
            # Verify
            if [ $(stat -c%s "$WRAPPER_JAR") -lt 50000 ]; then
              echo "Failed to extract wrapper jar, trying alternative method..."
              # Alternative: use gradle wrapper from a known working project
              curl -fSL "https://raw.githubusercontent.com/nickmcdonnell/gradle-wrapper-jar/main/gradle-wrapper.jar" -o "$WRAPPER_JAR"
            fi
            
            rm -f gradle.zip
          fi
          
          echo "Wrapper jar size: $(stat -c%s $WRAPPER_JAR) bytes"
          chmod +x gradlew
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release.apk
      
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
