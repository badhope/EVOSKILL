name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      
      - name: Build Debug APK
        id: build
        run: gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build_output.txt
      
      - name: Show Build Errors
        if: steps.build.outcome == 'failure'
        run: |
          grep -E "e: file://|Unresolved|Cannot find|None of|Overload|Type mismatch|Incompatible|\.kt:" build_output.txt || echo "No specific errors found, showing last 50 lines:"
          tail -50 build_output.txt
      
      - name: Upload Debug APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/
          retention-days: 90
      
      - name: Delete old draft releases
        if: steps.build.outcome == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName,isDraft -q '.[] | select(.isDraft==true) | .tagName' | xargs -I{} gh release delete {} --yes --cleanup-tag 2>/dev/null || true
      
      - name: Create Release with APK
        if: steps.build.outcome == 'success' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Banana Toolbox v1.0.${{ github.run_number }}"
          body: |
            ## 🍌 Banana Toolbox
            
            多功能安卓工具箱应用
            
            ### 功能模块
            - 📁 文件管理
            - 📱 应用管理
            - 🌐 网络工具
            - 🔧 实用工具
            - 🎮 游戏中心
            
            ### 下载
            - `app-debug.apk` - 调试版本（可直接安装）
            
            ### 安装要求
            - Android 7.0 (API 24) 及以上
          files: app/build/outputs/apk/debug/
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
