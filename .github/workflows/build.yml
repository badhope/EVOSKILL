name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Generate Gradle Wrapper
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ] || [ $(stat -c%s "gradle/wrapper/gradle-wrapper.jar" 2>/dev/null || echo 0) -lt 50000 ]; then
            echo "Generating Gradle Wrapper..."
            mkdir -p gradle/wrapper
            curl -L -o gradle-wrapper.jar "https://github.com/nickmcdonnell/gradle-wrapper-jar/releases/download/v8.4/gradle-wrapper.jar" || \
            curl -L -o gradle-wrapper.jar "https://github.com/nickmcdonnell/gradle-wrapper-jar/raw/main/gradle-wrapper.jar" || \
            wget -O gradle-wrapper.jar "https://github.com/nickmcdonnell/gradle-wrapper-jar/releases/download/v8.4/gradle-wrapper.jar"
            mv gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x gradlew
      
      - name: Verify Gradle Wrapper
        run: |
          ls -la gradle/wrapper/
          file gradle/wrapper/gradle-wrapper.jar
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/app-release.apk
      
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
