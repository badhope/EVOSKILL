<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>OnlineCode</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
</head>
<body>
<div id="app">
    <!-- 顶栏：极简一行 -->
    <header class="topbar">
        <div class="topbar-brand">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
            <span class="logo-text">OnlineCode</span>
        </div>
        <div class="topbar-center">
            <select class="lang-picker" id="lang-picker">
                <option value="python" selected>Python</option>
                <option value="cpp">C / C++</option>
                <option value="rust">Rust</option>
                <option value="go">Go</option>
                <option value="js">JavaScript</option>
            </select>
        </div>
        <div class="topbar-actions">
            <button class="tb-btn tb-output" id="tb-output" aria-label="输出">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
            </button>
            <button class="tb-btn tb-menu" id="tb-menu" aria-label="菜单">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="5" r="2"/>
                    <circle cx="12" cy="12" r="2"/>
                    <circle cx="12" cy="19" r="2"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- 主工作区 -->
    <div class="workspace" id="workspace">
        <!-- 编辑器 -->
        <div class="editor-wrap" id="editor-wrap">
            <textarea id="code-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"
                placeholder="# 在这里输入代码...
print('Hello, OnlineCode!')"></textarea>
        </div>

        <!-- 拖拽分割线 -->
        <div class="resizer" id="resizer">
            <div class="resizer-handle"></div>
        </div>

        <!-- 输出面板 -->
        <div class="output-wrap" id="output-wrap">
            <div class="output-header">
                <span>输出</span>
                <div class="output-tabs">
                    <button class="otab active" data-tab="console">控制台</button>
                    <button class="otab" data-tab="graphics">图形</button>
                    <button class="otab" data-tab="canvas3d">3D</button>
                </div>
                <button class="otab-close" id="output-close">&times;</button>
            </div>
            <div class="output-body">
                <div class="opanel active" id="panel-console">
                    <div id="console-output" class="console"></div>
                </div>
                <div class="opanel" id="panel-graphics"><canvas id="graphics-canvas"></canvas></div>
                <div class="opanel" id="panel-canvas3d"><canvas id="canvas-3d"></canvas></div>
            </div>
        </div>
    </div>

    <!-- 浮动运行按钮 -->
    <button class="fab" id="fab-run" aria-label="运行">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
    </button>
    <button class="fab fab-stop" id="fab-stop" aria-label="停止" style="display:none">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    </button>

    <!-- 状态提示 -->
    <div class="run-toast" id="run-toast">
        <span class="toast-dot"></span>
        <span id="toast-text">就绪</span>
    </div>
</div>

<!-- 遮罩 -->
<div class="overlay" id="menu-overlay"></div>

<!-- 菜单面板 -->
<div class="menu-panel" id="menu-panel">
    <div class="menu-section">
        <div class="menu-title">文件</div>
        <button class="menu-item" id="mi-save">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            <span>保存代码</span>
        </button>
        <button class="menu-item" id="mi-load">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>加载代码</span>
        </button>
        <button class="menu-item" id="mi-share">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            <span>分享代码</span>
        </button>
        <button class="menu-item" id="mi-clear">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            <span>清空代码</span>
        </button>
    </div>
    <div class="menu-section">
        <div class="menu-title">工具</div>
        <button class="menu-item" id="mi-fullscreen">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            <span>全屏模式</span>
        </button>
    </div>
    <div class="menu-section">
        <div class="menu-title">设置</div>
        <button class="menu-item" id="mi-settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>设置</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    </div>
</div>

<!-- 设置面板（扩展为多标签页） -->
<div class="sub-panel" id="sub-settings">
    <div class="sub-header">
        <button class="sub-back" id="settings-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span>设置</span>
    </div>
    
    <!-- 设置标签页 -->
    <div class="settings-tabs">
        <button class="stab active" data-stab="editor">编辑器</button>
        <button class="stab" data-stab="packages">包管理</button>
        <button class="stab" data-stab="data">数据</button>
        <button class="stab" data-stab="history">历史</button>
    </div>
    
    <!-- 编辑器设置 -->
    <div class="stab-panel active" id="stab-editor">
        <div class="setting-row">
            <span>主题</span>
            <select id="theme-select"><option value="dark">深色</option><option value="light">浅色</option></select>
        </div>
        <div class="setting-row">
            <span>字体大小</span>
            <div class="size-ctrl">
                <button class="size-btn" id="font-dec">-</button>
                <span id="font-val">14</span>
                <button class="size-btn" id="font-inc">+</button>
            </div>
        </div>
        <div class="setting-row">
            <span>自动保存</span>
            <label class="sw"><input type="checkbox" id="auto-save" checked><span class="sw-track"></span></label>
        </div>
    </div>
    
    <!-- 包管理 -->
    <div class="stab-panel" id="stab-packages">
        <div class="pkg-search-row">
            <input type="text" id="package-search" placeholder="搜索包名..." autocomplete="off">
            <button class="btn-go" id="btn-search-package">搜索</button>
        </div>
        <div class="pkg-list" id="package-list">
            <div class="pkg-item"><div><b>numpy</b><small>科学计算</small></div><button class="btn-install" data-name="numpy">安装</button></div>
            <div class="pkg-item"><div><b>matplotlib</b><small>绘图库</small></div><button class="btn-install" data-name="matplotlib">安装</button></div>
            <div class="pkg-item"><div><b>pandas</b><small>数据分析</small></div><button class="btn-install" data-name="pandas">安装</button></div>
            <div class="pkg-item"><div><b>requests</b><small>HTTP请求</small></div><button class="btn-install" data-name="requests">安装</button></div>
            <div class="pkg-item"><div><b>pillow</b><small>图像处理</small></div><button class="btn-install" data-name="pillow">安装</button></div>
        </div>
    </div>
    
    <!-- 数据管理 -->
    <div class="stab-panel" id="stab-data">
        <div class="setting-row">
            <div>
                <span>导出所有代码</span>
                <small>下载为JSON文件</small>
            </div>
            <button class="btn-action" id="btn-export">导出</button>
        </div>
        <div class="setting-row">
            <div>
                <span>导入代码</span>
                <small>从JSON文件恢复</small>
            </div>
            <button class="btn-action" id="btn-import">导入</button>
        </div>
        <div class="setting-row danger">
            <div>
                <span>清除所有数据</span>
                <small>删除所有保存的代码和历史</small>
            </div>
            <button class="btn-action danger" id="btn-clear-all">清除</button>
        </div>
        <input type="file" id="file-import" accept=".json" style="display:none">
    </div>
    
    <!-- 历史记录 -->
    <div class="stab-panel" id="stab-history">
        <div class="history-list" id="history-list">
            <div class="history-empty">暂无运行历史</div>
        </div>
        <button class="btn-clear-history" id="btn-clear-history">清空历史</button>
    </div>
</div>

<!-- 加载 -->
<div class="loading" id="loading">
    <div class="spinner"></div>
    <span id="loading-text">正在加载 Python 运行环境...</span>
</div>

<script src="js/app.js"></script>
<script src="js/editor.js"></script>
<script src="js/compiler.js"></script>
<script src="js/packages.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
</body>
</html>
